<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>年金資産シミュレーター</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family: Arial;
    margin:40px;
}

.section{
    border:1px solid #ccc;
    padding:15px;
    margin-bottom:20px;
    background:#f9f9f9;
}

.resultBox{
    font-size:32px;
    font-weight:bold;
    margin-top:20px;
}

canvas{
    max-width:100%;
}

.sliderValue{
    font-weight:bold;
    color:#2c3e50;
}

</style>

</head>

<body>

<h2>年金資産シミュレーター</h2>

<div class="section">

<b>試算前提</b><br>
給与：入力金額の80%手取り<br>
公的年金：入力金額の90%手取り<br>
年金：マクロ経済スライド（インフレ×0.8）<br>
DC取り崩し：受取90%手取り<br>

</div>

<div class="section">

<h3>基本設定</h3>

開始年齢<br>
<input type="number" id="startAge" value="60"><br>

想定寿命<br>
<input type="number" id="lifeExpectancy" value="90"><br>

退職年齢<br>
<input type="number" id="retirementAge" value="65"><br>

年金開始年齢<br>
<input type="number" id="pensionStartAge" value="65"><br>

</div>

<div class="section">

<h3>生活費</h3>

生活費（月）<br>
<input type="text" id="basicLivingCost" value="200,000" onblur="formatNumber(this)"><br>

娯楽費（月）<br>
<input type="text" id="leisureCost" value="100,000" onblur="formatNumber(this)"><br>

インフレ率<br>
<input type="number" step="0.01" id="inflationRate" value="0.02">

</div>

<div class="section">

<h3>収入</h3>

60歳以降給与（月）<br>
<input type="text" id="salaryAfter60" value="300,000" onblur="formatNumber(this)"><br>

公的年金（月）<br>
<input type="text" id="publicPension" value="250,000" onblur="formatNumber(this)"><br>

</div>

<div class="section">

<h3>資産</h3>

DC残高<br>
<input type="text" id="dcBalance" value="20,000,000" onblur="formatNumber(this)"><br>

想定利回り<br>

<input type="range"
       id="dcReturnRate"
       min="0"
       max="0.1"
       step="0.005"
       value="0.05"
       oninput="updateSliderValue()">

<span class="sliderValue" id="returnRateLabel">5%</span>

</div>

<button id="simulateBtn" onclick="runSimulation()">シミュレーション実行</button>

<div id="assetLife" class="resultBox"></div>

<hr>

<canvas id="balanceChart"></canvas>

<hr>

<h3>シミュレーション詳細</h3>
<div id="resultTable"></div>

<script>

let chart;

function updateSliderValue(){

    const val = document.getElementById("dcReturnRate").value;

    document.getElementById("returnRateLabel")
    .innerText = (val*100).toFixed(1) + "%";

}

function formatNumber(input){

    let value = input.value.replace(/,/g,'');

    if(value === "") return;

    if(!isNaN(value)){
        input.value = Number(value).toLocaleString();
    }

}

function removeComma(value){

    return Number(value.replace(/,/g,''));

}

async function runSimulation(){

    const button = document.getElementById("simulateBtn");

    button.innerText = "計算中...";

    const lifeExpectancy =
    Number(document.getElementById('lifeExpectancy').value);

    const requestData = {

        startAge:Number(document.getElementById('startAge').value),
        lifeExpectancy:lifeExpectancy,
        retirementAge:Number(document.getElementById('retirementAge').value),
        pensionStartAge:Number(document.getElementById('pensionStartAge').value),

        basicLivingCost:removeComma(document.getElementById('basicLivingCost').value),
        leisureCost:removeComma(document.getElementById('leisureCost').value),

        salaryAfter60:removeComma(document.getElementById('salaryAfter60').value),
        publicPension:removeComma(document.getElementById('publicPension').value),

        dcBalance:removeComma(document.getElementById('dcBalance').value),

        inflationRate:Number(document.getElementById('inflationRate').value),
        dcReturnRate:Number(document.getElementById('dcReturnRate').value)

    };

    const response = await fetch('/api/simulate',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(requestData)
    });

    const data = await response.json();

    button.innerText = "シミュレーション実行";

    const assetLifeDiv = document.getElementById("assetLife");

    if(data.assetDepletionAge === -1){

        assetLifeDiv.innerHTML =
        "🟢 資産は " + lifeExpectancy + " 歳まで持ちます";

    }else{

        assetLifeDiv.innerHTML =
        "🔴 資産寿命：" + data.assetDepletionAge + "歳";

    }

    const ages = data.yearlyResults.map(y => y.age);
    const balances = data.yearlyResults.map(y => y.balance);
    const incomes = data.yearlyResults.map(y => y.income);
    const expenses = data.yearlyResults.map(y => y.expense);

    const ctx = document.getElementById('balanceChart');

    if(chart){
        chart.destroy();
    }

    chart = new Chart(ctx,{

        type:'line',

        data:{
            labels:ages,
            datasets:[

                {
                    label:'DC残高',
                    data:balances,
                    borderColor:'blue',
                    borderWidth:3,
                    tension:0.3,
                    yAxisID:'y1'
                },

                {
                    label:'収入',
                    data:incomes,
                    borderColor:'green',
                    borderWidth:2,
                    tension:0.3,
                    yAxisID:'y'
                },

                {
                    label:'支出',
                    data:expenses,
                    borderColor:'red',
                    borderWidth:2,
                    tension:0.3,
                    yAxisID:'y'
                }

            ]
        },

        options:{

            responsive:true,

            interaction:{
                mode:'index',
                intersect:false
            },

            plugins:{
                legend:{
                    position:'top'
                }
            },

            scales:{

                y:{
                    type:'linear',
                    position:'left',
                    title:{
                        display:true,
                        text:'年間収支'
                    }
                },

                y1:{
                    type:'linear',
                    position:'right',
                    grid:{
                        drawOnChartArea:false
                    },
                    title:{
                        display:true,
                        text:'DC残高'
                    }
                }

            }

        }

    });

    let tableHtml = `
    <table border="1" cellpadding="5">
    <tr>
    <th>年齢</th>
    <th>収入</th>
    <th>支出</th>
    <th>DC残高</th>
    </tr>
    `;

    data.yearlyResults.forEach(y=>{

        tableHtml += `
        <tr>
        <td>${y.age}</td>
        <td>${y.income.toLocaleString()}</td>
        <td>${y.expense.toLocaleString()}</td>
        <td>${y.balance.toLocaleString()}</td>
        </tr>
        `;

    });

    tableHtml += "</table>";

    document.getElementById("resultTable").innerHTML = tableHtml;

}

updateSliderValue();

</script>

</body>
</html>
